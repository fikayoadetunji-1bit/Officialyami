<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error</title>
    <style>
        body { 
            background: #fff; 
            color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { text-align: center; padding: 20px; }
        h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #888; line-height: 1.5; }
        .code { font-family: monospace; margin-top: 20px; font-size: 0.7rem; color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Error 402</h1>
        <p>This site is temporarily unavailable.<br>The connection to the hosting server has been interrupted.</p>
        <div class="code">STATUS_CODE: PAYMENT_REQUIRED_FOR_RESUME</div>
    </div>
</body>
</html>
